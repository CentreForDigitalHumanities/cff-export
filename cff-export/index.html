<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CFF export</title>
  </head>
  <body>
    <main class="container py-5">
        <h1>CFF export</h1>
        <p>Export CITATION.cff files to  other formats.</p>

        <div class="row">
            <div class="col-md-6">
                <label for="input-cff-data" class="form-label">CFF data</label>
                <textarea id="input-cff-data" name="data" class="form-control"
                    rows="16"></textarea>
            </div>
            <div class="col-md-6">        
                <label for="input-format" class="form-label">Convert to</label>
                <select id="input-format" name="format" class="form-select">
                    <option value="apa">APA</option>
                    <option value="bibtex">BibTeX</option>
                    <option value="bibtex">BibLaTeX</option>
                    <option value="csljson">CSL-JSON</option>
                </select>

                <p class="mt-4">Output</p>
                <div role="alert">
                    <div class="alert alert-danger" hidden id="error">
                        <p class="mb-0" id="error-message">
                            Something went wrong!
                        </p>
                    </div>
                </div>
                <div id="output" class="border p-3"></div>
            </div>
        </div>
    </main>
    <footer class="container py-5">
        <img src="/cdh.jpg" width="500">
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
